name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much detail as possible.

  - type: dropdown
    id: deployment
    attributes:
      label: How are you running ArchLens?
      options:
        - Docker (docker run / docker compose)
        - Local Node.js (npm run dev)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Docker tag or git commit (check /api/health for version)
      placeholder: v3.0.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to Vendor Analysis page
        2. Click Run AI Analysis
        3. See error...
    validations:
      required: true

  - type: dropdown
    id: ai_provider
    attributes:
      label: AI Provider (if AI feature related)
      options:
        - Anthropic Claude
        - OpenAI
        - DeepSeek
        - Not applicable
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console logs / error messages
      description: Paste any relevant logs from the browser console or Docker logs
      render: shell
