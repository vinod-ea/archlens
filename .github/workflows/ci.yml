name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint client
        run: cd client && npx eslint src --ext .js,.jsx --max-warnings 20

      - name: Build React client
        run: cd client && npm run build
        env:
          CI: false

      - name: Verify server starts
        run: |
          timeout 10 node server/index.js &
          sleep 5
          curl -sf http://localhost:3001/api/health || exit 1
          kill %1 || true
        env:
          PORT: 3001
          DB_TYPE: sqlite
          DB_PATH: /tmp/test-archlens.db

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/archlens"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "push=false" >> $GITHUB_OUTPUT
            echo "tags=${REPO}:pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "push=true" >> $GITHUB_OUTPUT
            echo "tags=${REPO}:edge,${REPO}:main-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "push=true" >> $GITHUB_OUTPUT
            echo "tags=${REPO}:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.meta.outputs.push }}
          load: ${{ steps.meta.outputs.push == 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | cut -d',' -f1)
          docker run -d --name archlens-test \
            -p 3000:3000 \
            -e DB_TYPE=sqlite \
            "$TAG"
          sleep 15
          curl -sf http://localhost:3000/api/health
          docker stop archlens-test
