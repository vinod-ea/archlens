name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint client
        run: cd client && npm run lint

      - name: Build React client
        run: cd client && npm run build
        env:
          CI: false   # treat warnings as warnings, not errors during build

      - name: Verify server starts
        run: |
          timeout 10 node server/index.js &
          sleep 5
          curl -sf http://localhost:3001/api/health || exit 1
          kill %1 || true
        env:
          PORT: 3001
          DB_TYPE: sqlite
          DB_PATH: /tmp/test-archlens.db

  # ── Docker Build ────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: archlens:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Docker image
        run: |
          docker run -d --name archlens-test \
            -p 3000:3000 \
            -e DB_TYPE=sqlite \
            archlens:ci-${{ github.sha }}
          sleep 15
          curl -sf http://localhost:3000/api/health
          docker stop archlens-test
