name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on v1.0.0, v2.1.3, etc.

permissions:
  contents: write
  packages: write

jobs:
  # ── Build & Push Docker image ───────────────────────────────────────────────
  docker-release:
    name: Docker Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}   # strip leading 'v'
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME"    >> $GITHUB_OUTPUT

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Publish to GitHub Container Registry (free, no account needed)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optionally publish to Docker Hub (set DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets)
      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker image metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/archlens
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/archlens', secrets.DOCKERHUB_USERNAME) || '' }}
          tags: |
            # Keep the git tag (e.g. v3.0.0) as an image tag for copy/paste docs.
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Publish/advance latest on every semver release tag.
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64   # covers x86 servers + Apple Silicon / Raspberry Pi
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

  # ── GitHub Release Notes ────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for changelog

      - name: Generate release notes
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            # GitHub Container Registry
            docker pull ghcr.io/${{ github.repository_owner }}/archlens:${{ github.ref_name }}

            # Quick run
            docker run -p 3000:3000 -v archlens-data:/app/data \
              ghcr.io/${{ github.repository_owner }}/archlens:${{ github.ref_name }}
            ```

            Open **http://localhost:3000** after the container starts.

            See [CHANGELOG.md](CHANGELOG.md) for full details.
